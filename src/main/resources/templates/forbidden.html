<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiCloud 无权限访问</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
<div class="forbidden-shell">
    <section class="forbidden-card surface">
        <div class="section-eyebrow">Access Restricted</div>
        <h1 class="section-title hero-title-compact">无权限访问</h1>
        <p class="subtitle centered-copy">
            当前账号没有管理员权限，因此无法访问该页面或接口。你可以返回用户首页继续管理自己的文件，或重新登录其他账号。
        </p>
        <div class="actions actions-centered">
            <a class="primary-button" href="/dashboard">返回用户首页</a>
            <a class="button-link" href="/user/login">返回登录页</a>
            <button class="theme-toggle" type="button" data-theme-toggle>
                <span class="theme-toggle-icon" data-theme-icon aria-hidden="true"></span>
                <span class="sr-only" data-theme-label>切换主题</span>
            </button>
        </div>
    </section>
</div>
</body>
</html>
