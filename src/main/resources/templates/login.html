<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiCloud 登录</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
    <script src="/js/app.js"></script>
</head>
<body>
<div class="page-shell auth-page auth-page-centered">
    <section class="auth-card surface auth-card-centered">
        <div class="auth-header">
            <div>
                <div class="section-eyebrow">Private Cloud Drive</div>
                <div class="brand-mark auth-brand">KiCloud</div>
                <h2 class="section-title">登录 KiCloud</h2>
                <p class="subtitle">登录以继续访问你的个人网盘与分享管理空间。</p>
            </div>
            <button class="theme-toggle" type="button" data-theme-toggle>
                <span class="theme-toggle-icon" data-theme-icon aria-hidden="true"></span>
                <span class="sr-only" data-theme-label>切换主题</span>
            </button>
        </div>

        <form id="login-form" class="auth-form" method="post" action="/user/login">
            <div>
                <label for="account">用户名或用户 ID</label>
                <input id="account" name="account" type="text" autocomplete="username" placeholder="请输入用户名或纯数字 ID">
            </div>

            <div>
                <label for="password">密码</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
            </div>

            <button class="primary-button" id="submit-button" type="submit">进入工作台</button>
        </form>

        <div id="message" class="status-message message-top-gap"></div>

        <div class="auth-actions">
            <div class="helper-text">没有账号？可以先创建一个新的网盘账户。</div>
            <a class="button-link" href="/user/register">前往注册</a>
        </div>

        <div class="hint hint-block">
            使用账号登录后即可进入工作台。
        </div>
    </section>
</div>

<script>
    const form = document.getElementById('login-form');
    const accountInput = document.getElementById('account');
    const passwordInput = document.getElementById('password');
    const submitButton = document.getElementById('submit-button');
    const messageBox = document.getElementById('message');
    const { setMessage, requestJson } = window.KiCloudApp;

    function buildLoginPayload(account, password) {
        if (/^\d+$/.test(account)) {
            return {
                id: Number(account),
                password
            };
        }
        return {
            username: account,
            password
        };
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'session-expired') {
        setMessage(messageBox, '登录状态已失效，请重新登录。', 'error');
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setMessage(messageBox, '', '');
        submitButton.disabled = true;

        const account = accountInput.value.trim();
        const password = passwordInput.value;

        if (!account) {
            setMessage(messageBox, '请输入用户名或用户 ID。', 'error');
            submitButton.disabled = false;
            return;
        }

        if (!password) {
            setMessage(messageBox, '请输入密码。', 'error');
            submitButton.disabled = false;
            return;
        }

        try {
            const result = await requestJson('/user/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(buildLoginPayload(account, password))
            });

            if (result.code === 1) {
                setMessage(messageBox, result.msg || '登录成功。', 'success');
                window.location.href = '/dashboard';
                return;
            }

            setMessage(messageBox, result.msg || '登录失败。', 'error');
        } catch (error) {
            setMessage(messageBox, '请求失败。', 'error');
        } finally {
            submitButton.disabled = false;
        }
    });
</script>
</body>
</html>
